name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  #  Stage 1: Smart Contract Lint, Test, and Build
  # ─────────────────────────────────────────────────────────────────────────────
  contracts-lint:
    name: Contracts — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Run cargo fmt check
        run: cargo fmt --all -- --check

      - name: Run clippy (strict)
        run: cargo clippy --workspace --tests -- -D warnings

  contracts-test:
    name: Contracts — Test
    runs-on: ubuntu-latest
    needs: [contracts-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Run all contract tests
        run: cargo test --workspace

  contracts-build:
    name: Contracts — Build WASM
    runs-on: ubuntu-latest
    needs: [contracts-test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Build WASM artifacts
        run: cargo build --workspace --target wasm32-unknown-unknown --release

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  #  Stage 2: Frontend Lint, Typecheck, Test, and Build
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "./apps/web/package-lock.json"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

  frontend-test:
    name: Frontend — Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    defaults:
      run:
        working-directory: ./apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "./apps/web/package-lock.json"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    needs: [frontend-test]
    defaults:
      run:
        working-directory: ./apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "./apps/web/package-lock.json"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./apps/web/.next
          retention-days: 7
