name: Deploy

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: [main]
    types: [completed]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  #  Deploy Smart Contracts to Stellar Testnet
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-contracts:
    name: Deploy Smart Contracts
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Build WASM artifacts
        run: cargo build --workspace --target wasm32-unknown-unknown --release

      - name: Deploy contracts (if secret is configured)
        if: ${{ secrets.STELLAR_SECRET_KEY != '' }}
        run: |
          echo "Deploying Router..."
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/aqua_swap_router.wasm \
            --source ${{ secrets.STELLAR_SECRET_KEY }} \
            --network testnet
          echo "Deploying Factory..."
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/aqua_swap_factory.wasm \
            --source ${{ secrets.STELLAR_SECRET_KEY }} \
            --network testnet
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────────
  #  Deploy Frontend
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: ./apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "./apps/web/package-lock.json"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build for production
        run: npm run build

      - name: Deploy to Vercel (if token is configured)
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
