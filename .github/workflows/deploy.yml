name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-contract:
    name: Deploy Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build contract WASMs
        run: cargo build --workspace --target wasm32-unknown-unknown --release

      - name: Install Stellar CLI
        run: |
          curl -sL https://github.com/stellar/stellar-cli/releases/download/v22.0.0/stellar-cli-22.0.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv stellar-cli-22.0.0-x86_64-unknown-linux-gnu/stellar /usr/local/bin/ || echo "Failed to move, using fallback"
        continue-on-error: true

      - name: Deploy Router contract
        run: |
          if [ -n "${{ secrets.STELLAR_SECRET_KEY }}" ]; then
            stellar contract deploy \
              --wasm target/wasm32-unknown-unknown/release/aqua_swap_router.wasm \
              --source ${{ secrets.STELLAR_SECRET_KEY }} \
              --network testnet
          else
            echo "Skipping deploy: STELLAR_SECRET_KEY not set"
          fi

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [deploy-contract]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web

      - name: Deploy to Vercel
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
          else
            echo "Skipping vercel deploy: VERCEL_TOKEN not set"
          fi
        working-directory: apps/web
